AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Backend do site GELCIP - API Gateway + Lambda + DynamoDB (deploy operacional)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Ambiente de deploy (dev ou prod)
  AdminEmail:
    Type: String
    Default: contato@gelcip.com
    Description: E-mail que recebe notificações
  SiteDomain:
    Type: String
    Description: Domínio do site (para CORS)
  AdminPasswordHash:
    Type: String
    NoEcho: true
    Description: Hash bcrypt da senha do admin
  JwtSecret:
    Type: String
    NoEcho: true
    Description: Segredo para assinatura de tokens JWT

Mappings:
  EnvConfig:
    dev:
      Suffix: "-dev"
    prod:
      Suffix: ""

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64

Resources:
  # API Gateway
  GelcipApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowOrigin: !Sub "'${SiteDomain}'"
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"

  # DynamoDB
  InscricoesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - "gelcip-inscricoes${Suffix}"
        - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ContatosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - "gelcip-contatos${Suffix}"
        - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # Lambda - Inscrição
  InscricaoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub
        - "gelcip-inscricao${Suffix}"
        - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      Handler: index.handler
      CodeUri: inscricao/
      Environment:
        Variables:
          TABLE_NAME: !Ref InscricoesTable
          ADMIN_EMAIL: !Ref AdminEmail
          SITE_DOMAIN: !Ref SiteDomain
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InscricoesTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        PostInscricao:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /inscricao
            Method: POST

  # Lambda - Contato
  ContatoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub
        - "gelcip-contato${Suffix}"
        - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      Handler: index.handler
      CodeUri: contato/
      Environment:
        Variables:
          TABLE_NAME: !Ref ContatosTable
          ADMIN_EMAIL: !Ref AdminEmail
          SITE_DOMAIN: !Ref SiteDomain
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContatosTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        PostContato:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /contato
            Method: POST

  # Lambda - Admin
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub
        - "gelcip-admin${Suffix}"
        - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      Handler: index.handler
      CodeUri: admin/
      Timeout: 15
      Environment:
        Variables:
          INSCRICOES_TABLE: !Ref InscricoesTable
          CONTATOS_TABLE: !Ref ContatosTable
          SITE_DOMAIN: !Ref SiteDomain
          SSM_PREFIX: !Sub
            - "/gelcip${Suffix}"
            - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InscricoesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ContatosTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub
                  - 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/gelcip${Suffix}/*'
                  - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      Events:
        AdminLogin:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/login
            Method: POST
        AdminListInscricoes:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/inscricoes
            Method: GET
        AdminListContatos:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/contatos
            Method: GET
        AdminDeleteInscricao:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/inscricoes/{id}
            Method: DELETE
        AdminDeleteContato:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/contatos/{id}
            Method: DELETE

  # SSM Parameter Store - Segredos do Admin
  AdminPasswordHashParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub
        - "/gelcip${Suffix}/admin-password-hash"
        - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      Type: String
      Value: !Ref AdminPasswordHash
      Description: Hash bcrypt da senha do admin

  JwtSecretParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub
        - "/gelcip${Suffix}/jwt-secret"
        - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      Type: String
      Value: !Ref JwtSecret
      Description: Segredo JWT para autenticação do admin

  # Custom Resource - Esvaziar buckets S3 ao deletar o stack
  EmptyBucketsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub
        - "gelcip-empty-buckets${Suffix}"
        - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
      Handler: index.handler
      CodeUri: empty-buckets/
      Timeout: 300
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:ListBucketVersions
                - s3:DeleteObject
                - s3:DeleteObjectVersion
              Resource:
                - !Sub
                  - "arn:aws:s3:::gelcip${Suffix}"
                  - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
                - !Sub
                  - "arn:aws:s3:::gelcip${Suffix}/*"
                  - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
                - !Sub
                  - "arn:aws:s3:::gelcip-deploy${Suffix}"
                  - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
                - !Sub
                  - "arn:aws:s3:::gelcip-deploy${Suffix}/*"
                  - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]

  EmptyBucketsOnDelete:
    Type: Custom::EmptyBuckets
    Properties:
      ServiceToken: !GetAtt EmptyBucketsFunction.Arn
      BucketNames:
        - !Sub
          - "gelcip${Suffix}"
          - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]
        - !Sub
          - "gelcip-deploy${Suffix}"
          - Suffix: !FindInMap [EnvConfig, !Ref Environment, Suffix]

Outputs:
  ApiUrl:
    Description: URL base da API
    Value: !Sub "https://${GelcipApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  Environment:
    Description: Ambiente
    Value: !Ref Environment
