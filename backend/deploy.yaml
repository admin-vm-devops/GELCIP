AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Backend do site GELCIP - API Gateway + Lambda + DynamoDB (deploy operacional)

Parameters:
  AdminEmail:
    Type: String
    Default: contato@gelcip.com
    Description: E-mail que recebe notificações
  SiteDomain:
    Type: String
    Default: http://gelcip.s3-website.us-east-2.amazonaws.com
    Description: Domínio do site (para CORS)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64

Resources:
  # API Gateway
  GelcipApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: !Sub "'${SiteDomain}'"
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"

  # DynamoDB
  InscricoesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: gelcip-inscricoes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ContatosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: gelcip-contatos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # Lambda - Inscrição
  InscricaoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gelcip-inscricao
      Handler: index.handler
      CodeUri: inscricao/
      Environment:
        Variables:
          TABLE_NAME: !Ref InscricoesTable
          ADMIN_EMAIL: !Ref AdminEmail
          SITE_DOMAIN: !Ref SiteDomain
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InscricoesTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        PostInscricao:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /inscricao
            Method: POST

  # Lambda - Contato
  ContatoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gelcip-contato
      Handler: index.handler
      CodeUri: contato/
      Environment:
        Variables:
          TABLE_NAME: !Ref ContatosTable
          ADMIN_EMAIL: !Ref AdminEmail
          SITE_DOMAIN: !Ref SiteDomain
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContatosTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        PostContato:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /contato
            Method: POST

  # Lambda - Admin
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gelcip-admin
      Handler: index.handler
      CodeUri: admin/
      Timeout: 15
      Environment:
        Variables:
          INSCRICOES_TABLE: !Ref InscricoesTable
          CONTATOS_TABLE: !Ref ContatosTable
          SITE_DOMAIN: !Ref SiteDomain
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InscricoesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ContatosTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/gelcip/*'
      Events:
        AdminLogin:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/login
            Method: POST
        AdminListInscricoes:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/inscricoes
            Method: GET
        AdminListContatos:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/contatos
            Method: GET
        AdminDeleteInscricao:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/inscricoes/{id}
            Method: DELETE
        AdminDeleteContato:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /admin/contatos/{id}
            Method: DELETE

  # Custom Resource - Esvaziar buckets S3 ao deletar o stack
  EmptyBucketsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gelcip-empty-buckets
      Handler: index.handler
      CodeUri: empty-buckets/
      Timeout: 300
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:ListBucketVersions
                - s3:DeleteObject
                - s3:DeleteObjectVersion
              Resource:
                - arn:aws:s3:::gelcip
                - arn:aws:s3:::gelcip/*
                - arn:aws:s3:::gelcip-deploy
                - arn:aws:s3:::gelcip-deploy/*

  EmptyBucketsOnDelete:
    Type: Custom::EmptyBuckets
    Properties:
      ServiceToken: !GetAtt EmptyBucketsFunction.Arn
      BucketNames:
        - gelcip
        - gelcip-deploy

Outputs:
  ApiUrl:
    Description: URL base da API
    Value: !Sub "https://${GelcipApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
