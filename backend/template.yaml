AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Infraestrutura completa do site GELCIP - hospedagem estática S3 + backend serverless.
  NOTA: Este template é para recriação do zero (nova conta/região).
  Para atualizações incrementais, use o stack 'gelcip-backend' com template.yaml.

Parameters:
  AdminEmail:
    Type: String
    Default: contato@gelcip.com
    Description: E-mail que recebe notificações de inscrições e contatos

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64

Resources:
  # ============================================================
  # HOSTING - S3 Static Website
  # ============================================================

  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: gelcip
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'

  # ============================================================
  # DEPLOY - S3 Bucket para artefatos CloudFormation
  # ============================================================

  DeployBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: gelcip-deploy
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # ============================================================
  # BACKEND - API Gateway
  # ============================================================

  GelcipApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: !Sub "'${SiteBucket.WebsiteURL}'"
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"

  # ============================================================
  # BACKEND - DynamoDB Tables
  # ============================================================

  InscricoesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: gelcip-inscricoes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ContatosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: gelcip-contatos
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ============================================================
  # BACKEND - Lambda Functions
  # ============================================================

  InscricaoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gelcip-inscricao
      Handler: index.handler
      CodeUri: inscricao/
      Environment:
        Variables:
          TABLE_NAME: !Ref InscricoesTable
          ADMIN_EMAIL: !Ref AdminEmail
          SITE_DOMAIN: !GetAtt SiteBucket.WebsiteURL
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InscricoesTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        PostInscricao:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /inscricao
            Method: POST

  ContatoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gelcip-contato
      Handler: index.handler
      CodeUri: contato/
      Environment:
        Variables:
          TABLE_NAME: !Ref ContatosTable
          ADMIN_EMAIL: !Ref AdminEmail
          SITE_DOMAIN: !GetAtt SiteBucket.WebsiteURL
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ContatosTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        PostContato:
          Type: Api
          Properties:
            RestApiId: !Ref GelcipApi
            Path: /contato
            Method: POST

  # ============================================================
  # E-MAIL - SES Email Identity
  # ============================================================

  SesEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref AdminEmail

# ============================================================
# OUTPUTS
# ============================================================

Outputs:
  SiteUrl:
    Description: URL do site (S3 website)
    Value: !GetAtt SiteBucket.WebsiteURL

  ApiUrl:
    Description: URL base da API backend
    Value: !Sub "https://${GelcipApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  InscricoesTableName:
    Description: Tabela DynamoDB de inscrições
    Value: !Ref InscricoesTable

  ContatosTableName:
    Description: Tabela DynamoDB de contatos
    Value: !Ref ContatosTable

  AdminEmailIdentity:
    Description: E-mail configurado no SES (verificar manualmente)
    Value: !Ref AdminEmail
